name: zanny_collection
description: "Zanny Collection - Premium Fashion & Streetwear in Kenya"
publish_to: 'none'
version: 1.0.24+43

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Navigation ──────────────────────────────────────────────────────────────
  go_router: ^14.2.0

  # ── State Management ────────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Networking (Cloudflare Worker API) ──────────────────────────────────────
  dio: ^5.4.3+1

  # ── Push Notifications: Firebase FCM ────────────────────────────────────────
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.1.2

  # ── UI & Fonts ───────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  image_picker: ^1.1.2

  # ── Local Storage ────────────────────────────────────────────────────────────
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0

  # ── File / APK Installer (auto-update) ──────────────────────────────────────
  open_file: ^3.3.2
  path_provider: ^2.1.3
  flutter_native_splash: ^2.4.0

  # ── Utils ─────────────────────────────────────────────────────────────────────
  intl: ^0.19.0
  url_launcher: ^6.3.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

# ── App Icon Configuration ──────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo_with_bg.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/logo_transparent.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false

# ── Splash Screen Configuration ─────────────────────────────────────────────
flutter_native_splash:
  color: "#0A0A0A"
  image: assets/images/logo_with_bg.png
  color_dark: "#0A0A0A"
  image_dark: assets/images/logo_with_bg.png
  android_12:
    color: "#0A0A0A"
    image: assets/images/logo_transparent.png
    icon_background_color: "#0A0A0A"
  fullscreen: true
  android: true
  ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - .env
